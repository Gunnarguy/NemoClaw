name: sync-upstream

# Runs every 6 hours and on manual trigger
on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Add upstream remote
        run: git remote add upstream https://github.com/NVIDIA/NemoClaw.git

      - name: Fetch upstream
        run: git fetch upstream main

      - name: Check if behind
        id: check
        run: |
          BEHIND=$(git rev-list --count HEAD..upstream/main)
          echo "behind=$BEHIND" >> "$GITHUB_OUTPUT"
          echo "Upstream is $BEHIND commits ahead"

      - name: Fast-forward merge
        if: steps.check.outputs.behind != '0'
        id: merge
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git merge --ff-only upstream/main; then
            echo "result=success" >> "$GITHUB_OUTPUT"
            git push origin main
          else
            echo "result=conflict" >> "$GITHUB_OUTPUT"
          fi

      - name: Create PR on conflict
        if: steps.merge.outputs.result == 'conflict'
        run: |
          BRANCH="auto/sync-upstream-$(date +%Y%m%d-%H%M)"
          git checkout -b "$BRANCH"
          git merge upstream/main --no-edit || true
          git add -A
          git commit -m "chore: merge upstream (conflicts need manual resolution)" --allow-empty
          git push origin "$BRANCH"
          gh pr create \
            --title "chore: sync upstream (has conflicts)" \
            --body "Automated upstream sync found merge conflicts that need manual resolution. Review the changes and resolve conflicts before merging." \
            --base main \
            --head "$BRANCH"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
