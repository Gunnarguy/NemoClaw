name: sync-upstream

# Syncs this fork with NVIDIA/NemoClaw every 6 hours.
# Uses GitHub's merge-upstream API so we never need to git-push workflow files
# (which would require a PAT with the 'workflows' scope).

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Sync fork via GitHub API
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          RESULT=$(gh repo sync "$REPO" --source NVIDIA/NemoClaw --branch main 2>&1) || {
            echo "::warning::$RESULT"
            # If fast-forward fails, it likely means the fork has diverged.
            # A manual sync via the GitHub UI ("Sync fork") is required.
            echo "Sync could not fast-forward. Visit https://github.com/$REPO and click 'Sync fork' to resolve."
            exit 1
          }
          echo "$RESULT"
