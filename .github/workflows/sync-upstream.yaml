name: sync-upstream

# Syncs this fork with NVIDIA/NemoClaw every 6 hours.
# Uses GitHub's merge-upstream API so we never need to git-push workflow files.

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write
  workflows: write

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Sync fork via merge-upstream API
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          HTTP_CODE=$(curl -s -o /tmp/response.json -w "%{http_code}" \
            -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/$REPO/merge-upstream" \
            -d '{"branch":"main"}')

          BODY=$(cat /tmp/response.json)
          echo "$BODY" | jq . 2>/dev/null || echo "$BODY"

          case "$HTTP_CODE" in
            200)
              MERGE_TYPE=$(echo "$BODY" | jq -r '.merge_type // "unknown"')
              echo "Fork synced successfully (merge_type: $MERGE_TYPE)"
              ;;
            409)
              echo "::error::Merge conflict — visit https://github.com/$REPO and click 'Sync fork' to resolve manually."
              exit 1
              ;;
            *)
              echo "::error::Unexpected HTTP $HTTP_CODE from merge-upstream API"
              exit 1
              ;;
          esac
